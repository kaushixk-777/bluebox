<!DOCTYPE html>
<html>
<head>
    <title>Triangle Moving Box</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #111;
        }

        .box {
            width: 80px;
            height: 80px;
            background: blue;
            position: absolute;
            animation: triangleMove 6s linear infinite;
        }

        @keyframes triangleMove {
            0% {
                top: 10%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            33% {
                top: 80%;
                left: 90%;
                transform: translate(-50%, -50%);
            }

            66% {
                top: 80%;
                left: 10%;
                transform: translate(-50%, -50%);
            }

            100% {
                top: 10%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>

<div class="box"></div>

</body>
</html>
